<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antino AI</title>
  <meta name="description" content="Antino AI — voice-first assistant powered by RAG" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET ──────────────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080810;
      --surface: #0f0f1a;
      --border: rgba(255, 255, 255, 0.06);
      --text: #d4d4e8;
      --text-dim: #4a4a6a;
      --text-user: #6366f1;
      --accent: #6366f1;
      --accent-soft: rgba(99, 102, 241, 0.12);
      --green: #10b981;
      --red: #f43f5e;
      --amber: #f59e0b;
      --radius: 16px;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* ─── LAYOUT ─────────────────────────────────────────────────────── */
    #app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      padding: 0 24px;
      /* side padding so content never touches edges */
    }

    /* ambient background glow */
    #app::before {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(99, 102, 241, 0.07) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* ─── HEADER ─────────────────────────────────────────────────────── */
    #header {
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 0;
      z-index: 10;
    }

    .wordmark {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .wordmark span {
      color: var(--accent);
    }

    #kb-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }

    #kb-btn:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    /* ─── ORB STAGE ──────────────────────────────────────────────────── */
    #orb-stage {
      flex: 0 0 auto;
      /* don't grow — give transcript room */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px 0 24px;
      /* breathing room top & bottom */
      z-index: 1;
    }

    #orb-wrap {
      position: relative;
      width: 148px;
      height: 148px;
      cursor: pointer;
    }

    /* Outer ring — always visible, slow spin */
    .orb-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(99, 102, 241, 0.15);
      animation: ring-spin 12s linear infinite;
    }

    .orb-ring::after {
      content: '';
      position: absolute;
      top: -3px;
      left: 50%;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      transform: translateX(-50%);
      box-shadow: 0 0 8px var(--accent);
    }

    @keyframes ring-spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Second ring — counter-spin */
    .orb-ring-2 {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 1px dashed rgba(99, 102, 241, 0.08);
      animation: ring-spin 18s linear infinite reverse;
    }

    /* Core */
    #orb-core {
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%,
          rgba(120, 115, 255, 0.9),
          rgba(60, 55, 180, 0.6) 50%,
          rgba(20, 18, 60, 0.4));
      box-shadow:
        0 0 30px rgba(99, 102, 241, 0.3),
        0 0 60px rgba(99, 102, 241, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      transition: box-shadow .5s, background .5s;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Shimmer inside core */
    #orb-core::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg,
          rgba(255, 255, 255, 0.08) 0%,
          transparent 60%);
    }

    /* Wave bars in core */
    .wave-bars {
      display: flex;
      align-items: center;
      gap: 2.5px;
      opacity: 0;
      transition: opacity .3s;
    }

    .wave-bars span {
      display: block;
      width: 2.5px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.85);
      animation: wave 0.9s ease-in-out infinite;
    }

    .wave-bars span:nth-child(1) {
      height: 12px;
      animation-delay: 0.00s;
    }

    .wave-bars span:nth-child(2) {
      height: 22px;
      animation-delay: 0.10s;
    }

    .wave-bars span:nth-child(3) {
      height: 32px;
      animation-delay: 0.05s;
    }

    .wave-bars span:nth-child(4) {
      height: 20px;
      animation-delay: 0.15s;
    }

    .wave-bars span:nth-child(5) {
      height: 28px;
      animation-delay: 0.08s;
    }

    .wave-bars span:nth-child(6) {
      height: 16px;
      animation-delay: 0.12s;
    }

    @keyframes wave {

      0%,
      100% {
        transform: scaleY(.45);
      }

      50% {
        transform: scaleY(1);
      }
    }

    /* Mic icon inside core */
    .core-icon {
      position: absolute;
      font-size: 28px;
      opacity: 0.7;
      transition: opacity .3s, transform .3s;
      user-select: none;
    }

    /* ── STATE MACHINE ─────────────────────────────────────── */

    /* LISTENING */
    body.listening #orb-core {
      background: radial-gradient(circle at 40% 35%,
          rgba(244, 63, 94, 0.95),
          rgba(160, 20, 50, 0.6) 50%,
          rgba(30, 5, 10, 0.4));
      box-shadow:
        0 0 35px rgba(244, 63, 94, 0.45),
        0 0 70px rgba(244, 63, 94, 0.15);
      animation: listen-breathe 0.9s ease-in-out infinite;
    }

    body.listening .core-icon {
      opacity: 0;
    }

    body.listening .wave-bars {
      opacity: 1;
    }

    @keyframes listen-breathe {

      0%,
      100% {
        box-shadow: 0 0 30px rgba(244, 63, 94, 0.4), 0 0 60px rgba(244, 63, 94, 0.12);
      }

      50% {
        box-shadow: 0 0 50px rgba(244, 63, 94, 0.65), 0 0 90px rgba(244, 63, 94, 0.2);
      }
    }

    /* THINKING */
    body.thinking #orb-core {
      background: radial-gradient(circle at 40% 35%,
          rgba(245, 158, 11, 0.9),
          rgba(120, 70, 5, 0.6) 50%,
          rgba(15, 10, 0, 0.4));
      box-shadow:
        0 0 40px rgba(245, 158, 11, 0.35),
        0 0 80px rgba(245, 158, 11, 0.1);
    }

    body.thinking .orb-ring {
      border-color: rgba(245, 158, 11, 0.25);
      animation-duration: 3s;
    }

    body.thinking .orb-ring::after {
      background: var(--amber);
      box-shadow: 0 0 8px var(--amber);
    }

    body.thinking .core-icon {
      opacity: 0;
    }

    body.thinking .wave-bars {
      opacity: 0;
    }

    /* SPEAKING */
    body.speaking #orb-core {
      background: radial-gradient(circle at 40% 35%,
          rgba(16, 185, 129, 0.9),
          rgba(5, 80, 55, 0.6) 50%,
          rgba(0, 10, 8, 0.4));
      box-shadow:
        0 0 35px rgba(16, 185, 129, 0.4),
        0 0 70px rgba(16, 185, 129, 0.12);
    }

    body.speaking .orb-ring {
      border-color: rgba(16, 185, 129, 0.2);
    }

    body.speaking .orb-ring::after {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    body.speaking .core-icon {
      opacity: 0;
    }

    body.speaking .wave-bars {
      opacity: 1;
    }

    /* Status label */
    #status-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: color .4s;
    }

    body.listening #status-label {
      color: var(--red);
    }

    body.thinking #status-label {
      color: var(--amber);
    }

    body.speaking #status-label {
      color: var(--green);
    }

    /* ─── TRANSCRIPT ─────────────────────────────────────────────────── */
    #transcript {
      flex: 1;
      /* take all available space between orb and input */
      width: 100%;
      max-width: 580px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      /* more breathing room between messages */
      padding: 8px 0 16px;
      /* top & bottom breathing room */
      z-index: 1;
      scrollbar-width: none;
    }

    #transcript::-webkit-scrollbar {
      display: none;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 2px;
      animation: msg-in .25s ease;
    }

    @keyframes msg-in {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .msg.user .msg-label {
      color: var(--text-user);
    }

    .msg-body {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text);
    }

    .msg.user .msg-body {
      color: rgba(99, 102, 241, 0.8);
    }

    /* Typing cursor on active AI message */
    .msg.ai.streaming .msg-body::after {
      content: '▋';
      display: inline-block;
      margin-left: 1px;
      color: var(--accent);
      animation: cursor-blink .7s steps(1) infinite;
    }

    @keyframes cursor-blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    /* Perf pills */
    #perf-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      opacity: 0;
      transition: opacity .4s;
      min-height: 20px;
      width: 100%;
      max-width: 580px;
      padding-bottom: 10px;
      /* space between pills and input bar */
    }

    #perf-row.visible {
      opacity: 1;
    }

    .pill {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      letter-spacing: 0.03em;
    }

    .pill .val {
      color: var(--green);
    }

    /* ─── INPUT BAR ──────────────────────────────────────────────────── */
    #input-bar {
      width: 100%;
      max-width: 580px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 0 32px;
      /* comfortable bottom clearance */
      z-index: 10;
    }

    #text-input {
      flex: 1;
      height: 46px;
      padding: 0 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      caret-color: var(--accent);
    }

    #text-input:focus {
      border-color: rgba(99, 102, 241, 0.4);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08);
    }

    #text-input::placeholder {
      color: var(--text-dim);
    }

    .act-btn {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
    }

    .act-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.2);
    }

    #send-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px rgba(99, 102, 241, 0.3);
    }

    #send-btn:hover {
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.5);
    }

    /* ─── DRAWER (Knowledge Base) ────────────────────────────────────── */
    #drawer {
      position: fixed;
      top: 0;
      right: -380px;
      width: 360px;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      gap: 18px;
      transition: right .3s cubic-bezier(.4, 0, .2, 1);
      z-index: 200;
      overflow-y: auto;
      scrollbar-width: none;
    }

    #drawer::-webkit-scrollbar {
      display: none;
    }

    #drawer.open {
      right: 0;
    }

    .drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .drawer-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .drawer-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color .2s, background .2s;
    }

    .drawer-close:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .block {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .block-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-dim);
    }

    .d-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 9px 12px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }

    .d-input:focus {
      border-color: rgba(99, 102, 241, 0.4);
    }

    .d-input::placeholder {
      color: var(--text-dim);
    }

    .d-btn {
      width: 100%;
      height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 9px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: box-shadow .2s, opacity .2s;
    }

    .d-btn:hover {
      box-shadow: 0 0 14px rgba(99, 102, 241, 0.4);
    }

    .d-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 9px;
      padding: 18px;
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .2s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.over {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(99, 102, 241, 0.04);
    }

    .drop-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    #file-label {
      font-size: 11px;
      color: var(--accent);
      min-height: 14px;
      word-break: break-all;
    }

    /* Progress */
    #prog-wrap {
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    #prog-wrap.show {
      display: flex;
    }

    .prog-header {
      display: flex;
      justify-content: space-between;
    }

    .prog-title {
      font-size: 11px;
      color: var(--text-dim);
    }

    .prog-pct {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
    }

    .prog-track {
      height: 3px;
      background: var(--bg);
      border-radius: 2px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 2px;
      transition: width .4s cubic-bezier(.4, 0, .2, 1);
    }

    .prog-msg {
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* History */
    #hist-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 140px;
      overflow-y: auto;
    }

    .hist-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 9px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 11px;
      color: var(--text-dim);
      word-break: break-all;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.done {
      background: var(--green);
    }

    .dot.running {
      background: var(--amber);
      animation: pulse-dot 1s infinite;
    }

    .dot.error {
      background: var(--red);
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }
  </style>
</head>

<body class="idle">
  <div id="app">

    <!-- Header -->
    <header id="header">
      <div class="wordmark">Antino <span>AI</span></div>
      <button id="kb-btn" onclick="toggleDrawer()">Knowledge Base</button>
    </header>

    <!-- Orb Stage -->
    <section id="orb-stage">

      <div id="orb-wrap" onclick="toggleRecording()" title="Click to speak">
        <div class="orb-ring"></div>
        <div class="orb-ring-2"></div>
        <div id="orb-core">
          <div class="core-icon">🎙️</div>
          <div class="wave-bars">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <div id="status-label">Ready</div>

    </section>

    <!-- Transcript -->
    <div id="transcript"></div>
    <div id="perf-row">
      <div class="pill">Retrieval: <span class="val" id="p-ret">—</span></div>
      <div class="pill">TTFT: <span class="val" id="p-ttft">—</span></div>
      <div class="pill">Total: <span class="val" id="p-total">—</span></div>
    </div>

    <!-- Input Bar -->
    <div id="input-bar">
      <input id="text-input" type="text" placeholder="Ask anything about Antino…" onkeydown="onKey(event)"
        autocomplete="off" />
      <button class="act-btn" id="send-btn" onclick="sendText()" title="Send">↑</button>
      <button class="act-btn" id="kb-icon-btn" onclick="toggleDrawer()" title="Knowledge Base">⊞</button>
    </div>

  </div>

  <!-- Drawer -->
  <div id="drawer">
    <div class="drawer-head">
      <span class="drawer-title">Knowledge Base</span>
      <button class="drawer-close" onclick="toggleDrawer()">✕</button>
    </div>

    <!-- URL Ingest -->
    <div class="block">
      <div class="block-label">Add URL</div>
      <input id="url-in" class="d-input" type="url" placeholder="https://www.example.com/" />
      <button id="url-btn" class="d-btn" onclick="ingestURL()">Ingest URL</button>
    </div>

    <!-- Document Upload -->
    <div class="block">
      <div class="block-label">Upload Document</div>
      <div class="drop-zone" id="drop-zone">
        Drop PDF or TXT here — or click to browse
        <input type="file" id="file-in" accept=".pdf,.txt" onchange="onFileSelect(event)" />
      </div>
      <div id="file-label"></div>
      <button id="file-btn" class="d-btn" onclick="ingestDoc()" disabled>Upload &amp; Ingest</button>
    </div>

    <!-- Progress -->
    <div id="prog-wrap" class="block">
      <div class="prog-header">
        <span class="prog-title" id="prog-title">Processing…</span>
        <span class="prog-pct" id="prog-pct">0%</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" id="prog-fill"></div>
      </div>
      <div class="prog-msg" id="prog-msg"></div>
    </div>

    <!-- History -->
    <div class="block">
      <div class="block-label">Ingestion History</div>
      <div id="hist-list">
        <div style="font-size:11px;color:var(--text-dim)">No ingestions yet.</div>
      </div>
    </div>
  </div>

  <script>
    /* ── State ──────────────────────────────────────────────────────── */
    let recording = false;
    let mediaRec = null;
    let audioChunks = [];
    let audioQueue = [];
    let isPlaying = false;
    let inFlight = false;   // guard: only one request at a time
    let selectedFile = null;
    let pollTimer = null;
    let activeAIMsgEl = null;
    const MIN_AUDIO_BYTES = 2048;  // ignore blobs smaller than 2KB (tap noise)

    function setState(s) {
      document.body.className = s;
      const labels = {
        idle: 'Ready',
        listening: 'Listening…',
        thinking: 'Thinking…',
        speaking: 'Speaking',
      };
      document.getElementById('status-label').textContent = labels[s] ?? s;
    }

    /* ── Drawer ─────────────────────────────────────────────────────── */
    function toggleDrawer() {
      document.getElementById('drawer').classList.toggle('open');
    }

    /* ── Recording ──────────────────────────────────────────────────── */
    async function toggleRecording() {
      if (!recording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRec = new MediaRecorder(stream);
          audioChunks = [];
          mediaRec.ondataavailable = e => audioChunks.push(e.data);
          mediaRec.onstop = submitVoice;
          mediaRec.start();
          recording = true;
          setState('listening');
        } catch (e) {
          alert('Microphone access denied.');
        }
      } else {
        mediaRec.stop();
        mediaRec.stream.getTracks().forEach(t => t.stop());
        recording = false;
        setState('thinking');
      }
    }

    async function submitVoice() {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });

      // Guard: ignore accidental taps (< 2KB) or in-flight requests
      if (blob.size < MIN_AUDIO_BYTES) {
        setState('idle');
        return;
      }
      if (inFlight) return;

      const fd = new FormData();
      fd.append('audio', blob, 'recording.webm');
      resetResponse();
      setState('thinking');
      inFlight = true;
      try {
        const res = await fetch('/api/voice-chat-stream', { method: 'POST', body: fd });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: `HTTP ${res.status}` }));
          appendError(err.detail || `HTTP ${res.status}`);
          setState('idle');
          return;
        }
        await consumeSSE(res);
      } catch (e) {
        appendError(e.message);
      } finally {
        inFlight = false;
      }
    }

    /* ── Text send ──────────────────────────────────────────────────── */
    function onKey(e) {
      if (e.key === 'Enter') sendText();
    }
    async function sendText() {
      if (inFlight) return;
      const q = document.getElementById('text-input').value.trim();
      if (!q) return;
      document.getElementById('text-input').value = '';
      resetResponse();
      appendMsg('user', 'You', q);
      setState('thinking');
      inFlight = true;
      try {
        const res = await fetch('/api/text-chat-stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: `HTTP ${res.status}` }));
          appendError(err.detail || `HTTP ${res.status}`);
          setState('idle');
          return;
        }
        await consumeSSE(res);
      } catch (e) {
        appendError(e.message);
      } finally {
        inFlight = false;
      }
    }

    /* ── SSE consumer ───────────────────────────────────────────────── */
    async function consumeSSE(response) {
      // response.ok already checked by caller; start reading the stream
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      setState('speaking');

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });

        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let data;
          try { data = JSON.parse(line.slice(6)); } catch { continue; }

          switch (data.type) {

            case 'transcription':
              appendMsg('user', 'You', data.content);
              setPill('p-ttft', data.stt_time ? `${(data.stt_time * 1000).toFixed(0)}ms STT` : null);
              break;

            case 'meta':
              if (data.retrieval_time) setPill('p-ret', `${(data.retrieval_time * 1000).toFixed(0)}ms`);
              if (data.ttft) setPill('p-ttft', `${data.ttft.toFixed(2)}s`);
              document.getElementById('perf-row').classList.add('visible');
              break;

            case 'text':
              if (!activeAIMsgEl) activeAIMsgEl = appendMsg('ai', 'Antino AI', '');
              activeAIMsgEl.querySelector('.msg-body').textContent += data.content;
              activeAIMsgEl.classList.add('streaming');
              scrollTranscript();
              break;

            case 'audio':
              enqueueAudio(data.content);
              break;

            case 'done':
              if (activeAIMsgEl) activeAIMsgEl.classList.remove('streaming');
              if (data.total_time) setPill('p-total', `${data.total_time.toFixed(2)}s`);
              document.getElementById('perf-row').classList.add('visible');
              if (!isPlaying) setState('idle');
              break;
          }
        }
      }
      if (activeAIMsgEl) activeAIMsgEl.classList.remove('streaming');
      if (!isPlaying) setState('idle');
    }

    /* ── Transcript helpers ─────────────────────────────────────────── */
    function appendMsg(role, label, text) {
      const t = document.getElementById('transcript');
      // Remove placeholder text if present
      const placeholder = t.querySelector('.placeholder');
      if (placeholder) placeholder.remove();

      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `
    <div class="msg-label">${label}</div>
    <div class="msg-body">${text}</div>
  `;
      t.appendChild(div);
      scrollTranscript();
      if (role === 'ai') activeAIMsgEl = div;
      return div;
    }

    function scrollTranscript() {
      const t = document.getElementById('transcript');
      t.scrollTop = t.scrollHeight;
    }

    function appendError(msg) {
      appendMsg('ai', 'Error', `⚠ ${msg}`);
      setState('idle');
    }

    function resetResponse() {
      activeAIMsgEl = null;
      audioQueue = []; isPlaying = false;
      document.getElementById('perf-row').classList.remove('visible');
      ['p-ret', 'p-ttft', 'p-total'].forEach(id => {
        document.getElementById(id).textContent = '—';
      });
    }

    function setPill(id, val) {
      if (val) document.getElementById(id).textContent = val;
    }

    /* ── Audio queue ────────────────────────────────────────────────── */
    function enqueueAudio(b64) {
      audioQueue.push(b64);
      if (!isPlaying) playNext();
    }
    function playNext() {
      if (!audioQueue.length) {
        isPlaying = false;
        if (document.body.className === 'speaking') setState('idle');
        return;
      }
      isPlaying = true;
      setState('speaking');
      const audio = new Audio(`data:audio/mpeg;base64,${audioQueue.shift()}`);
      audio.onended = () => setTimeout(playNext, 80);
      audio.onerror = () => playNext();
      audio.play().catch(() => playNext());
    }

    /* ── Knowledge Base Ingestion ───────────────────────────────────── */
    async function ingestURL() {
      const url = document.getElementById('url-in').value.trim();
      if (!url) { alert('Enter a URL first.'); return; }
      setBusy(true);
      // Show progress bar right under the URL block
      const pw = document.getElementById('prog-wrap');
      document.getElementById('url-btn').closest('.block').after(pw);

      try {
        const r = await fetch('/api/ingest/url', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        if (!r.ok) {
          const err = await r.json().catch(() => ({ detail: `HTTP ${r.status}` }));
          throw new Error(err.detail || `HTTP ${r.status}`);
        }
        const d = await r.json();
        if (d.task_id) poll(d.task_id, url);
      } catch (e) {
        alert('Ingestion error: ' + e.message);
        setBusy(false);
      }
    }

    function onFileSelect(e) {
      selectedFile = e.target.files[0];
      document.getElementById('file-label').textContent = selectedFile?.name ?? '';
      document.getElementById('file-btn').disabled = !selectedFile;
    }

    async function ingestDoc() {
      if (!selectedFile) return;
      setBusy(true);
      // Show progress bar right under the Document block
      const pw = document.getElementById('prog-wrap');
      document.getElementById('file-btn').closest('.block').after(pw);

      try {
        const fd = new FormData();
        fd.append('file', selectedFile, selectedFile.name);
        const r = await fetch('/api/ingest/doc', { method: 'POST', body: fd });
        if (!r.ok) {
          const err = await r.json().catch(() => ({ detail: `HTTP ${r.status}` }));
          throw new Error(err.detail || `HTTP ${r.status}`);
        }
        const d = await r.json();
        if (d.task_id) poll(d.task_id, selectedFile.name);
      } catch (e) {
        alert('Ingestion error: ' + e.message);
        setBusy(false);
      }
    }

    function poll(task_id, label) {
      const pw = document.getElementById('prog-wrap');
      const pf = document.getElementById('prog-fill');
      const pp = document.getElementById('prog-pct');
      const pm = document.getElementById('prog-msg');
      const pt = document.getElementById('prog-title');

      // Reset styles
      pw.classList.add('show');
      pt.style.color = 'var(--text-dim)';
      pf.style.background = 'linear-gradient(90deg, var(--accent), var(--green))';
      pt.textContent = label;
      pf.style.width = '0%';
      pp.textContent = '0%';

      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        try {
          const r = await fetch(`/api/ingestion-status/${task_id}`);
          const d = await r.json();
          pf.style.width = `${d.progress}%`;
          pp.textContent = `${d.progress}%`;
          pm.textContent = d.message ?? '';

          if (d.status === 'done' || d.status === 'error') {
            clearInterval(pollTimer);
            setBusy(false);
            addHistory(label, d.status);

            // Show completion state
            if (d.status === 'done') {
              pt.textContent = 'Completed!';
              pt.style.color = 'var(--green)';
              pm.textContent = 'Successfully indexed to Pinecone.';
            } else {
              pt.textContent = 'Error';
              pt.style.color = 'var(--red)';
              pf.style.background = 'var(--red)';
            }

            // Auto-hide progress bar after 3 seconds
            setTimeout(() => {
              pw.classList.remove('show');
            }, 3000);

            // Reset inputs
            document.getElementById('url-in').value = '';
            document.getElementById('file-label').textContent = '';
            document.getElementById('file-btn').disabled = true;
            selectedFile = null;
          }
        } catch { }
      }, 1000);
    }

    function setBusy(b) {
      document.getElementById('url-btn').disabled = b;
      document.getElementById('file-btn').disabled = b;
    }

    function addHistory(label, status) {
      const list = document.getElementById('hist-list');
      const ph = list.querySelector('div');
      if (ph && ph.textContent.includes('No ingestions')) ph.remove();
      const row = document.createElement('div');
      row.className = 'hist-row';
      row.innerHTML = `<span class="dot ${status}"></span><span>${label}</span>`;
      list.prepend(row);
    }
  </script>
</body>
